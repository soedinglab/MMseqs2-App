name: Docker Backend Build

on:
  push:
    branches:
      - "master"
    paths:
      - "backend/**"
      - "Dockerfile.backend"
      - ".github/workflows/docker-backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - "Dockerfile.backend"
      - ".github/workflows/docker-backend.yml"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      app:
        description: "Frontend app to build"
        required: true
        type: choice
        options:
          - mmseqs
          - foldseek
        default: mmseqs
      tag:
        description: "Custom image tag"
        required: false
        type: string
      latest:
        description: "Also tag as latest"
        default: false
        type: boolean
      push:
        description: "Push image to registry"
        default: true
        type: boolean

env:
  REGISTRY: ghcr.io

jobs:
  build:
    strategy:
      matrix:
        app: ${{ github.event_name == 'workflow_dispatch' && fromJSON(format('["{0}"]', inputs.app)) || fromJSON('["mmseqs", "foldseek"]') }}
      fail-fast: false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.app }}-app-backend

      - name: Compute custom tags
        id: custom_tags
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ -n "$TAG" ]; then
            echo "tag=${REGISTRY}/${OWNER}/${APP}-app-backend:${TAG}" >> "$GITHUB_OUTPUT"
          fi
          if [ "$LATEST" = "true" ]; then
            echo "latest=${REGISTRY}/${OWNER}/${APP}-app-backend:latest" >> "$GITHUB_OUTPUT"
          fi
        env:
          REGISTRY: ${{ env.REGISTRY }}
          OWNER: ${{ github.repository_owner }}
          APP: ${{ matrix.app }}
          TAG: ${{ inputs.tag }}
          LATEST: ${{ inputs.latest }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.push) }}
          build-args: |
            FRONTEND_APP=${{ matrix.app }}
          cache-from: type=gha,scope=${{ matrix.app }}-backend
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}-backend
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ steps.custom_tags.outputs.tag }}
            ${{ steps.custom_tags.outputs.latest }}
          labels: ${{ steps.meta.outputs.labels }}
